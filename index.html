<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>사하의집 업무 허브</title>
<link rel="stylesheet" as="style" crossorigin
  href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" />
<style>
:root{
  --bg:#F1F4F6;
  --surface:#FFFFFF;
  --ink:#22303D;
  --ink-soft:#64758B;
  --ink-faint:#9BA9B8;
  --line:#DCE3E9;
  --primary:#3C6E8F;
  --primary-dark:#274B61;
  --primary-soft:#DCE9F0;
  --unit-a:#B98A2E;       /* 기린초 */
  --unit-a-soft:#F5EAD3;
  --unit-a-deep:#8A6A22;
  --unit-b:#A8638F;       /* 물봉선 */
  --unit-b-soft:#F3E3EC;
  --unit-b-deep:#7E4A6C;
  --shadow:0 1px 3px rgba(34,48,61,0.08), 0 1px 2px rgba(34,48,61,0.06);
  --shadow-lg:0 16px 40px rgba(34,48,61,0.14);
}
*{box-sizing:border-box;}
body{
  margin:0;font-family:'Pretendard',-apple-system,'Malgun Gothic',sans-serif;
  background:var(--bg);color:var(--ink);min-height:100vh;
}
.wrap{max-width:920px;margin:0 auto;padding:40px 20px 60px;}

.crumbs{display:flex;align-items:center;gap:6px;font-size:13.5px;color:var(--ink-soft);margin-bottom:22px;flex-wrap:wrap;}
.crumbs .seg{cursor:pointer;padding:4px 8px;border-radius:6px;}
.crumbs .seg:hover{background:var(--surface);}
.crumbs .seg.current{color:var(--ink);font-weight:700;cursor:default;}
.crumbs .seg.current:hover{background:transparent;}
.crumbs .sep{color:var(--ink-faint);}

header.hub-header{margin-bottom:28px;}
.eyebrow{font-size:12.5px;font-weight:700;color:var(--primary);letter-spacing:.06em;text-transform:uppercase;margin-bottom:6px;}
h1{margin:0;font-size:28px;font-weight:700;letter-spacing:-0.02em;}
.desc{margin:6px 0 0;font-size:14px;color:var(--ink-soft);}

.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:14px;}

.card{
  background:var(--surface);border-radius:16px;box-shadow:var(--shadow);
  padding:24px 22px;cursor:pointer;transition:.16s;border:1px solid transparent;
  display:flex;flex-direction:column;gap:6px;text-decoration:none;color:inherit;
}
.card:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg);border-color:var(--primary-soft);}
.card .icon{font-size:30px;margin-bottom:4px;}
.card .card-title{font-size:17px;font-weight:700;}
.card .card-sub{font-size:12.5px;color:var(--ink-faint);}
.card .arrow{margin-top:10px;font-size:12.5px;color:var(--primary);font-weight:700;}

.card.unit-기린초 .icon, .card.unit-기린초 .arrow{color:var(--unit-a-deep);}
.card.unit-기린초:hover{border-color:var(--unit-a);}
.card.unit-물봉선 .icon, .card.unit-물봉선 .arrow{color:var(--unit-b-deep);}
.card.unit-물봉선:hover{border-color:var(--unit-b);}

.section-label{font-size:12.5px;font-weight:700;color:var(--ink-faint);text-transform:uppercase;letter-spacing:.05em;margin:26px 0 10px;}

.empty-note{
  background:var(--surface);border:1px dashed var(--line);border-radius:14px;
  padding:22px;text-align:center;color:var(--ink-faint);font-size:13.5px;
}

.footer-note{
  margin-top:40px;font-size:12px;color:var(--ink-faint);text-align:center;line-height:1.7;
}
.footer-note code{background:var(--surface);padding:1px 6px;border-radius:5px;}

.hero-card{
  background:linear-gradient(135deg, #1F3A4D 0%, #2C5470 100%);
  border-radius:16px;box-shadow:var(--shadow);
  padding:34px 32px;margin-bottom:26px;overflow:hidden;position:relative;
}

    <div class="eyebrow" id="eyebrow">다하 사회복지법인</div>
    <h1 id="title">사하의집 업무 허브</h1>
    <p class="desc" id="desc">시설과 유닛을 눌러 원하는 업무용 웹앱으로 이동하세요.</p>
  </header>

  <div id="content"></div>

  <div class="footer-note">
    이 파일 상단의 <code>&lt;script&gt;</code> 안 <code>DATA</code> 객체를 수정하면 시설·유닛·앱을 자유롭게 추가/변경할 수 있어요.
  </div>
</div>

<script>
/* ============================================================
   여기에 시설 / 유닛 / 앱을 등록하세요.
   url 자리에 각 앱의 실제 GitHub Pages 주소를 넣어주시면 됩니다.
   (예: "https://ankle0701-web.github.io/medicine/")
   앱을 더 추가하고 싶으면 배열에 { name, url, icon } 객체를 더 넣으면 됩니다.
============================================================ */
const DATA = {
  "사하의집": {
    icon: "🏠",
    units: {
      "기린초": {
        label: "기린초 (남)",
        icon: "🌼",
        apps: [
          { name: "투약일지", icon: "💊", url: "https://ankle0701-web.github.io/medicine/" },
          { name: "배변일지", icon: "📋", url: "https://ankle0701-web.github.io/mens-bowel/" },
          { name: "신체측정", icon: "📏", url: "https://ankle0701-web.github.io/body-measurement-male/" },
          { name: "수분섭취", icon: "💧", url: "https://ankle0701-web.github.io/water-intake/" }
        ]
      },
      "물봉선": {
        label: "물봉선 (여)",
        icon: "🌸",
        apps: [
          { name: "투약일지", icon: "💊", url: "https://ankle0701-web.github.io/medicine/" },
          { name: "배변일지", icon: "📋", url: "https://ankle0701-web.github.io/checklist/" },
          { name: "생리일지", icon: "🩸", url: "https://ankle0701-web.github.io/menstruation/" },
          { name: "신체측정", icon: "📏", url: "https://ankle0701-web.github.io/body-measurement-female/" },
          { name: "수분섭취", icon: "💧", url: "https://ankle0701-web.github.io/water-intake/" }
        ]
      }
    }
  }
};

let path = []; // e.g. ["사하의집"] or ["사하의집","기린초"]

function render(){
  renderCrumbs();
  document.getElementById('heroCard').style.display = (path.length === 0) ? 'block' : 'none';
  const content = document.getElementById('content');

  if(path.length === 0){
    // 홈: 시설 목록
    document.getElementById('eyebrow').textContent = '다하 사회복지법인';
    document.getElementById('title').textContent = '업무 허브';
    document.getElementById('desc').textContent = '시설을 선택하세요.';
    const facilities = Object.keys(DATA);
    content.innerHTML = `<div class="card-grid">${
      facilities.map(f => `
        <div class="card" onclick="goTo('${f}')">
          <div class="icon">${DATA[f].icon}</div>
          <div class="card-title">${f}</div>
          <div class="card-sub">유닛 ${Object.keys(DATA[f].units).length}개</div>
          <div class="arrow">들어가기 →</div>
        </div>`).join('')
    }</div>`;

  }else if(path.length === 1){
    // 시설 선택됨: 유닛 목록
    const facility = DATA[path[0]];
    document.getElementById('eyebrow').textContent = '다하 사회복지법인';
    document.getElementById('title').textContent = path[0];
    document.getElementById('desc').textContent = '유닛을 선택하세요.';
    const unitKeys = Object.keys(facility.units);
    content.innerHTML = `<div class="card-grid">${
      unitKeys.map(u => {
        const unit = facility.units[u];
        return `<div class="card unit-${u}" onclick="goTo('${path[0]}','${u}')">
          <div class="icon">${unit.icon}</div>
          <div class="card-title">${unit.label}</div>
          <div class="card-sub">앱 ${unit.apps.length}개</div>
          <div class="arrow">들어가기 →</div>
        </div>`;
      }).join('')
    }</div>`;

  }else if(path.length === 2){
    // 유닛 선택됨: 앱 목록
    const facility = DATA[path[0]];
    const unit = facility.units[path[1]];
    document.getElementById('eyebrow').textContent = `${path[0]} · ${unit.label}`;
    document.getElementById('title').textContent = '업무 앱';
    document.getElementById('desc').textContent = '이동할 앱을 선택하세요. 새 탭에서 열립니다.';

    if(unit.apps.length === 0){
      content.innerHTML = `<div class="empty-note">등록된 앱이 없습니다.</div>`;
      return;
    }
    content.innerHTML = `<div class="card-grid">${
      unit.apps.map(app => `
        <a class="card unit-${path[1]}" href="${app.url}" target="_blank" rel="noopener">
          <div class="icon">${app.icon}</div>
          <div class="card-title">${app.name}</div>
          <div class="card-sub">${app.url.includes('REPLACE-ME') ? '⚠️ 주소 미설정' : app.url.replace('https://','')}</div>
          <div class="arrow">열기 ↗</div>
        </a>`).join('')
    }</div>`;
  }
}

function renderCrumbs(){
  const crumbs = document.getElementById('crumbs');
  let html = `<span class="seg ${path.length===0?'current':''}" onclick="goTo()">🏠 홈</span>`;
  path.forEach((p, i) => {
    const isLast = i === path.length - 1;
    html += `<span class="sep">›</span><span class="seg ${isLast?'current':''}" onclick="goTo(${path.slice(0,i+1).map(x=>`'${x}'`).join(',')})">${p}</span>`;
  });
  crumbs.innerHTML = html;
}

function goTo(...args){
  path = args;
  render();
}

render();
</script>
</body>
</html>
